<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Velvet</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #1e1e2e; overflow: hidden; scrollbar-width: none; }
    #terminal { height: 100%; overflow: hidden; }
    #terminal { height: 100%; }
    @font-face {
      font-family: 'MesloLGS Nerd Font';
      src: url('/fonts/MesloLGSNerdFont-Regular.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'MesloLGS Nerd Font';
      src: url('/fonts/MesloLGSNerdFont-Bold.woff2') format('woff2');
      font-weight: bold;
      font-style: normal;
    }
    @font-face {
      font-family: 'MesloLGS Nerd Font';
      src: url('/fonts/MesloLGSNerdFont-Italic.woff2') format('woff2');
      font-weight: normal;
      font-style: italic;
    }
    @font-face {
      font-family: 'MesloLGS Nerd Font';
      src: url('/fonts/MesloLGSNerdFont-BoldItalic.woff2') format('woff2');
      font-weight: bold;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-canvas@0.7.0/lib/addon-canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-unicode11@0.8.0/lib/addon-unicode11.min.js"></script>
  <script>
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    const fontSize = isMobile ? 28 : 14;

    const term = new Terminal({
      allowProposedApi: true,
      cursorBlink: true,
      fontSize: fontSize,
      fontFamily: '"MesloLGS Nerd Font", Menlo, Monaco, "Courier New", monospace',
      theme: {
        background: '#1e1e2e',
        foreground: '#cdd6f4',
        cursor: '#f5e0dc',
      },
    });

    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.loadAddon(new WebLinksAddon.WebLinksAddon());
    term.loadAddon(new CanvasAddon.CanvasAddon());
    const unicode11Addon = new Unicode11Addon.Unicode11Addon();
    term.loadAddon(unicode11Addon);
    term.unicode.activeVersion = '11';

    term.open(document.getElementById('terminal'));
    term.focus();
    fitAddon.fit();

    const wsProtocol = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${wsProtocol}://${location.hostname}:${location.port}`);

    ws.onopen = () => {
      ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
    };

    ws.onmessage = (event) => {
      term.write(event.data);
    };

    ws.onclose = () => {
      term.write('\r\n\x1b[31m[disconnected]\x1b[0m\r\n');
    };

    // xtermjs does not implement OSC 52 out of the box,
    // so we intercept it to set the user clipboard.
    // This is needed to showcase text copying.
    // Note that this implementation is pretty sloppy, but it's all we need.
    term.parser.registerOscHandler(52, (data) => {
      const semi = data.indexOf(';');
      if (semi === -1) return false;
      const b64 = data.substring(semi + 1);
      if (!b64 || b64 === '?') return true;
      try {
        navigator.clipboard.writeText(atob(b64));
      } catch (e) {
        console.error(e)
      }
      return true;
    });


    // Translate Option+key to Alt (ESC prefix) since macOS browsers
    // produce special characters (å, π, etc.) instead of sending Meta
    term.attachCustomKeyEventHandler((event) => {
      const isLetter = event.code.startsWith('Key');
      const isDigit = event.code.startsWith('Digit');
      if (event.altKey && (isLetter || isDigit)) {
        if (event.type === 'keydown') {
          const key = isLetter ? event.code.charAt(3).toLowerCase() : event.code.charAt(5);
          ws.send(JSON.stringify({ type: 'data', data: '\x1b' + key }));
        }
        // Block both keydown and keypress to prevent composed char
        return false;
      }
      return true;
    });

    term.onData((data) => {
      ws.send(JSON.stringify({ type: 'data', data }));
    });

    window.addEventListener('resize', () => {
      fitAddon.fit();
      ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
    });
  </script>
</body>
</html>
